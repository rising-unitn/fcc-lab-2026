version: "3"
services:
  db:
    image: mariadb:10.6.4-focal
    command: '--default-authentication-plugin=mysql_native_password'
    # Named volume: managed entirely by Docker.
    # Data persists across 'docker-compose down' but is removed with '--volumes'.
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    env_file:
      - .env
    expose:
      - 3306
      - 33060

  wordpress:
    image: wordpress:latest
    ports:
      - 80:80
    volumes:
      # Named volume for WordPress PHP files (persistent, managed by Docker)
      - wp_data:/var/www/html
      # Bind mount: maps a host directory into the container.
      # Useful during development to inspect or edit uploaded files directly.
      - ./uploads:/var/www/html/wp-content/uploads
    restart: always
    env_file:
      - .env
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=${MYSQL_USER}
      - WORDPRESS_DB_PASSWORD=${MYSQL_PASSWORD}
      - WORDPRESS_DB_NAME=${MYSQL_DATABASE}

volumes:
  db_data:
  wp_data:
